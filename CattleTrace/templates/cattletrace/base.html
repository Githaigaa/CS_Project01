{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}CattleTrace{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'cattletrace/css/cattletrace.css' %}">
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-mark">CT</div>
                <div>
                    <div class="brand-title">CattleTrace</div>
                    <div class="brand-subtitle">Farmer</div>
                </div>
            </div>
            <nav class="side-nav" aria-label="Primary navigation">
                {% for key, label, route, icon in nav_items %}
                    <a class="nav-link {% if active_key == key %}active{% endif %}" href="{% url route %}">
                        <span class="nav-icon">{{ icon }}</span>
                        <span>{{ label }}</span>
                    </a>
                {% endfor %}
            </nav>
            <div class="sidebar-footer">
                <a class="nav-link muted-link" href="/admin/">
                    <span class="nav-icon">AD</span>
                    <span>Django Admin</span>
                </a>
            </div>
        </aside>

        <div class="main-shell">
            <header class="top-nav">
                <form class="global-search" method="get" action="">
                    <span class="search-icon">Search</span>
                    <input type="search" name="q" value="{{ query|default:'' }}" placeholder="Search animals, RFID, owners...">
                </form>
                <div class="top-actions">
                    <button class="icon-button" type="button" title="Scan QR">QR</button>
                    <button class="icon-button" type="button" title="Notifications">N</button>
                    <div class="user-pill">U</div>
                </div>
            </header>
            <main class="content">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
</body>
</html>
