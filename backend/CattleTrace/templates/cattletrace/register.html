{% extends 'cattletrace/base.html' %}{% block title %}Register | CattleTrace{% endblock %}{% block content %}
<section class="auth-panel card">
   <h1>Create Account</h1>
   <p>Start managing livestock traceability records.</p>
   <form method="post" class="form-grid">
      {% csrf_token %}<label>Username<input class="input" name="username"></label><label>Email<input class="input" type="email" name="email"></label><label>Password<input class="input" type="password" name="password"></label>
      <label>
         Role
         <select class="input" name="role">
            <option>Farmer</option>
            <option>Veterinarian</option>
            <option>Inspector</option>
            <option>Buyer</option>
         </select>
      </label>
      <button class="button primary" type="submit">Create Account</button>
   </form>
</section>
{% endblock %}
