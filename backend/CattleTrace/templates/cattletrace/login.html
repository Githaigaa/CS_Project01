{% extends 'cattletrace/base.html' %}{% block title %}Login | CattleTrace{% endblock %}{% block content %}
<section class="auth-panel card">
   <h1>Welcome Back</h1>
   <p>Log in to access livestock traceability tools.</p>
   <form method="post" class="form-grid one-col">{% csrf_token %}<label>Username<input class="input" name="username" required></label><label>Password<input class="input" type="password" name="password" required></label><button class="button primary" type="submit">Log in</button><a class="muted-link" href="{% url 'CattleTrace:register' %}">Create an account</a></form>
</section>
{% endblock %}
